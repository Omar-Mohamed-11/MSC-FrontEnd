<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <title>Order Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.google.com/specimen/Red+Hat+Display" rel="stylesheet">
    
    <style>
      .attribution { font-size: 0.6875rem; text-align: center; }
      .attribution a { color: hsl(228, 45%, 44%); }
    </style>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <main>
      <div class="card">
        <img class="background" src="images/illustration-hero.svg" alt="background image">
        <div class="info">
          <h1 class="tittle">Order Summary</h1>

          <p class="hook">
            You can now listen to millions of songs, audiobooks, and podcasts on any 
            device anywhere you like!
          </p>
        </div>

        <div class="plan">
          <img class="music" src="images/icon-music.svg" alt="music icon">
          <div class="plan-info">
            <p class="h">Annual Plan</p>
            <p class="price">$59.99/year</p>
          </div>
          <a href="#">Change</a>
        </div>

        <button class="payment">Proceed to Payment</button>
        <button class="cancel">Cancel Order</button>
      </div>
    </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/Omar-Mohamed-11">Omar Mohamed</a>.
    </footer>
  </body>
</html>
